<svg xmlns="http://www.w3.org/2000/svg" width="860" height="360" viewBox="0 0 860 360" role="img" aria-label="Output tokens as percent of baseline. RDXifier 26%, code-only 35%, prose-only 91%, baseline 100%.">
<rect width="860" height="360" rx="10" fill="#0d1117"/>
<text x="430" y="36" font-size="16" font-weight="700" fill="#c9d1d9" text-anchor="middle">Output tokens vs no-tool baseline — lower is better</text>
<text x="430" y="54" font-size="12" fill="#8b949e" text-anchor="middle">measured over 4 tasks; single-axis arms modeled generously (see README)</text>
<line x1="230" y1="70" x2="230" y2="310" stroke="#30363d" stroke-width="1"/>
<text x="230" y="328" font-size="11" fill="#6e7681" text-anchor="middle">0%</text>
<line x1="370" y1="70" x2="370" y2="310" stroke="#30363d" stroke-width="1"/>
<text x="370" y="328" font-size="11" fill="#6e7681" text-anchor="middle">25%</text>
<line x1="510" y1="70" x2="510" y2="310" stroke="#30363d" stroke-width="1"/>
<text x="510" y="328" font-size="11" fill="#6e7681" text-anchor="middle">50%</text>
<line x1="650" y1="70" x2="650" y2="310" stroke="#30363d" stroke-width="1"/>
<text x="650" y="328" font-size="11" fill="#6e7681" text-anchor="middle">75%</text>
<line x1="790" y1="70" x2="790" y2="310" stroke="#30363d" stroke-width="1"/>
<text x="790" y="328" font-size="11" fill="#6e7681" text-anchor="middle">100%</text>
<text x="216" y="92" font-size="13" fill="#8b949e" text-anchor="end">no tool (baseline)</text>
<rect x="230" y="76" width="560" height="26" rx="4" fill="#8b949e"/>
<text x="798" y="94" font-size="13" fill="#c9d1d9">100%</text>
<text x="216" y="152" font-size="13" fill="#8b949e" text-anchor="end">prose-only (caveman-style)</text>
<rect x="230" y="136" width="510" height="26" rx="4" fill="#d9822b"/>
<text x="748" y="154" font-size="13" fill="#c9d1d9">91%</text>
<text x="216" y="212" font-size="13" fill="#8b949e" text-anchor="end">code-only (ponytail-style)</text>
<rect x="230" y="196" width="196" height="26" rx="4" fill="#2da44e"/>
<text x="434" y="214" font-size="13" fill="#c9d1d9">35%</text>
<text x="216" y="272" font-size="13" fill="#8b949e" text-anchor="end" font-weight="700">RDXifier (both axes)</text>
<rect x="230" y="256" width="146" height="26" rx="4" fill="#d78a3c"/>
<text x="384" y="274" font-size="13" fill="#c9d1d9" font-weight="700">26%</text>
</svg>
