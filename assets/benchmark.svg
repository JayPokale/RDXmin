<svg xmlns="http://www.w3.org/2000/svg" width="860" height="340" viewBox="0 0 860 340" role="img" aria-label="Worst-case output size across 14 tasks as percent of the no-tool baseline. ponytail 227% (backfired 4 tasks), caveman 130% (1), RDXifier 83% (never backfires).">
<rect width="860" height="340" rx="10" fill="#0d1117"/>
<text x="430" y="34" font-size="17" font-weight="700" fill="#c9d1d9" text-anchor="middle">Worst case across 14 tasks — lower is better, past 100% is a betrayal</text>
<text x="430" y="54" font-size="11.5" fill="#8b949e" text-anchor="middle">output size vs using no tool at all (Haiku + Sonnet; code, prose &amp; judgment prompts)</text>
<rect x="408.33333333333337" y="80" width="361.66666666666663" height="200" fill="#cf3b3b" opacity="0.07"/><line x1="408.33333333333337" y1="80" x2="408.33333333333337" y2="280" stroke="#cf3b3b" stroke-width="1.5" stroke-dasharray="4 3"/><text x="408.33333333333337" y="74" font-size="11" fill="#cf3b3b" text-anchor="middle">100% = no tool</text><text x="589.1666666666667" y="294" font-size="10.5" fill="#cf3b3b" text-anchor="middle" opacity="0.8">⬅ backfire zone: tool made it WORSE than no tool</text><text x="138" y="117" font-size="14" fill="#c9d1d9" text-anchor="end">caveman</text><rect x="150" y="100" width="335.83333333333337" height="30" rx="4" fill="#d9822b"/><text x="494.83333333333337" y="114" font-size="14" fill="#c9d1d9">130%</text><text x="494.83333333333337" y="128" font-size="10.5" fill="#8b949e">backfired 1/14 tasks</text><text x="138" y="181" font-size="14" fill="#c9d1d9" text-anchor="end">ponytail</text><rect x="150" y="164" width="586.4166666666667" height="30" rx="4" fill="#cf3b3b"/><text x="745.4166666666667" y="178" font-size="14" fill="#c9d1d9">227%</text><text x="745.4166666666667" y="192" font-size="10.5" fill="#8b949e">backfired 4/14 tasks</text><text x="138" y="245" font-size="14" fill="#c9d1d9" text-anchor="end" font-weight="700">RDXifier</text><rect x="150" y="228" width="214.41666666666669" height="30" rx="4" fill="#2da44e"/><text x="373.4166666666667" y="242" font-size="14" fill="#c9d1d9" font-weight="700">83%</text><text x="373.4166666666667" y="256" font-size="10.5" fill="#8b949e">never backfires</text></svg>
