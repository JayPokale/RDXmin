<svg xmlns="http://www.w3.org/2000/svg" width="860" height="430" viewBox="0 0 860 430" role="img" aria-label="Visible answer size as percent of vanilla baseline, measured over 24 live model runs. Coding: rdxifier 14%, ponytail 29%, caveman 46%. Non-coding: caveman 79%, rdxifier 96%, ponytail 121%.">
<rect width="860" height="430" rx="10" fill="#0d1117"/>
<text x="430" y="28" font-size="16" font-weight="700" fill="#c9d1d9" text-anchor="middle">Visible answer size vs vanilla — measured, lower is better</text>
<text x="430" y="44" font-size="11" fill="#8b949e" text-anchor="middle">24 live runs (Haiku 4.5, 4 arms x 6 tasks); answer tokens as % of no-tool baseline</text>
<rect x="120" y="54" width="12" height="12" rx="2" fill="#8b949e"/><text x="138" y="64" font-size="12" fill="#8b949e">vanilla</text><rect x="270" y="54" width="12" height="12" rx="2" fill="#d9822b"/><text x="288" y="64" font-size="12" fill="#8b949e">caveman</text><rect x="420" y="54" width="12" height="12" rx="2" fill="#2da44e"/><text x="438" y="64" font-size="12" fill="#8b949e">ponytail</text><rect x="570" y="54" width="12" height="12" rx="2" fill="#d78a3c"/><text x="588" y="64" font-size="12" fill="#8b949e">RDXifier</text><text x="120" y="82" font-size="14" font-weight="600" fill="#c9d1d9">Coding tasks (n=3)</text><text x="110" y="106" font-size="12" fill="#8b949e" text-anchor="end">vanilla</text><rect x="120" y="92" width="540" height="22" rx="3" fill="#8b949e"/><text x="667" y="108" font-size="12" fill="#c9d1d9">100%</text><text x="110" y="136" font-size="12" fill="#8b949e" text-anchor="end">caveman</text><rect x="120" y="122" width="248.4" height="22" rx="3" fill="#d9822b"/><text x="375.4" y="138" font-size="12" fill="#c9d1d9">46%</text><text x="110" y="166" font-size="12" fill="#8b949e" text-anchor="end">ponytail</text><rect x="120" y="152" width="156.6" height="22" rx="3" fill="#2da44e"/><text x="283.6" y="168" font-size="12" fill="#c9d1d9">29%</text><text x="110" y="196" font-size="12" fill="#8b949e" text-anchor="end" font-weight="700">RDXifier</text><rect x="120" y="182" width="118.8" height="22" rx="3" fill="#d78a3c"/><text x="245.8" y="198" font-size="12" fill="#c9d1d9" font-weight="700">22%</text><text x="120" y="282" font-size="14" font-weight="600" fill="#c9d1d9">Non-coding tasks (n=3)</text><text x="110" y="306" font-size="12" fill="#8b949e" text-anchor="end">vanilla</text><rect x="120" y="292" width="540" height="22" rx="3" fill="#8b949e"/><text x="667" y="308" font-size="12" fill="#c9d1d9">100%</text><text x="110" y="336" font-size="12" fill="#8b949e" text-anchor="end">caveman</text><rect x="120" y="322" width="426.6" height="22" rx="3" fill="#d9822b"/><text x="553.6" y="338" font-size="12" fill="#c9d1d9">79%</text><text x="110" y="366" font-size="12" fill="#8b949e" text-anchor="end">ponytail</text><rect x="120" y="352" width="653.4" height="22" rx="3" fill="#2da44e"/><text x="780.4" y="368" font-size="12" fill="#c9d1d9">121%</text><text x="110" y="396" font-size="12" fill="#8b949e" text-anchor="end" font-weight="700">RDXifier</text><rect x="120" y="382" width="383.4" height="22" rx="3" fill="#d78a3c"/><text x="510.4" y="398" font-size="12" fill="#c9d1d9" font-weight="700">71%</text><line x1="660" y1="86" x2="660" y2="410" stroke="#30363d" stroke-width="1" stroke-dasharray="3 3"/><text x="660" y="76" font-size="10" fill="#6e7681" text-anchor="middle">100% = vanilla</text></svg>
